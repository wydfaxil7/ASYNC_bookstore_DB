services:
  postgres:
    image: postgres:15-alpine
    container_name: bookstore_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wydfaxil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Aprinov-1428}
      POSTGRES_DB: ${POSTGRES_DB:-bookstore}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookstore_api
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL}
      GROQ_SEARCH_MODEL: ${GROQ_SEARCH_MODEL}
      GROQ_REQUEST_TIMEOUT_SECONDS: ${GROQ_REQUEST_TIMEOUT_SECONDS}
      GROQ_SYSTEM_PROMPT: ${GROQ_SYSTEM_PROMPT}
      BOOK_SEARCH_PROMPT_TEMPLATE: ${BOOK_SEARCH_PROMPT_TEMPLATE}
      BOOK_RECOMMENDATION_PROMPT_TEMPLATE: ${BOOK_RECOMMENDATION_PROMPT_TEMPLATE}
      BOOK_CHAT_PROMPT_TEMPLATE: ${BOOK_CHAT_PROMPT_TEMPLATE}
      BOOK_SUMMARY_PROMPT_TEMPLATE: ${BOOK_SUMMARY_PROMPT_TEMPLATE}
      AI_SEARCH_TIMEOUT_SECONDS: ${AI_SEARCH_TIMEOUT_SECONDS}
      AI_RECOMMENDATION_TIMEOUT_SECONDS: ${AI_RECOMMENDATION_TIMEOUT_SECONDS}
      AI_SUMMARY_TIMEOUT_SECONDS: ${AI_SUMMARY_TIMEOUT_SECONDS}
      CHAT_MEMORY_LIMIT: ${CHAT_MEMORY_LIMIT}
      CHAT_CATALOG_SEARCH_LIMIT: ${CHAT_CATALOG_SEARCH_LIMIT}
  
volumes:
  postgres_data: