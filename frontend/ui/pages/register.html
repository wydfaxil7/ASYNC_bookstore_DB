<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | ASYNC Bookstore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Unbounded:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/ui/css/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="site-header container">
      <a class="brand" href="/ui">ASYNC Bookstore</a>
      <nav>
        <a href="/ui/login">Login</a>
        <a href="/ui/dashboard">Dashboard</a>
      </nav>
    </header>

    <main class="container centered">
      <section class="panel auth-panel reveal">
        <h1>Create Account</h1>
        <p class="muted">Register first, then continue to login.</p>
        <form id="registerForm" class="stack">
          <label>
            Username
            <input type="text" id="regUsername" required />
          </label>
          <label>
            Email
            <input type="email" id="regEmail" required />
          </label>
          <label>
            Password
            <input type="password" id="regPassword" required />
          </label>
          <button type="submit" class="btn">Register</button>
        </form>
        <p class="switch-link">
          Already registered? <a href="/ui/login">Login now</a>
        </p>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script src="/static/ui/js/common.js"></script>
    <script src="/static/ui/js/auth.js"></script>
  </body>
</html>
