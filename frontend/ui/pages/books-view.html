<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Books | ASYNC Bookstore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Unbounded:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/ui/css/styles.css" />
  </head>
  <body class="post-login-body page-view">
    <div class="bg-grid"></div>
    <header class="site-header container">
      <a class="brand" href="/ui/dashboard">ASYNC Bookstore</a>
      <nav>
        <a class="admin-only" href="/ui/books/write">Create Books</a>
        <a href="/ui/books/search">Search</a>
        <a href="/ui/books/ai-search">AI Search</a>
        <a href="/ui/profile">Profile</a>
        <a href="#" class="logout-link">Logout</a>
      </nav>
    </header>

    <main class="container page-shell">
      <section class="panel dashboard-hero reveal">
        <div>
          <p class="kicker">READ OPERATIONS</p>
          <h1 class="dash-title">Get Books and Get by ID</h1>
          <p class="muted">Browse the library, filter the shelf, or open one book in full detail from the same page.</p>
        </div>
        <img src="/static/ui/assets/bookstore-hero.svg" alt="Bookstore shelf illustration" />
      </section>

      <section class="page-grid-2">
        <article class="panel reveal">
          <div class="section-head">
            <h2>Book List</h2>
            <span id="listCount" class="badge">0</span>
          </div>
          <form id="listForm" class="stack">
            <div class="row-wrap">
              <input type="text" id="authorFilter" placeholder="Author" />
              <input type="text" id="genreFilter" placeholder="Genre" />
            </div>
            <div class="row-wrap">
              <input type="text" id="startDate" placeholder="Start date or year" />
              <input type="text" id="endDate" placeholder="End date or year" />
            </div>
            <div class="row-wrap">
              <input type="text" id="sortBy" placeholder="Sort by (name, author, genre, published_date)" />
              <input type="text" id="orderBy" placeholder="Order (asc or desc)" />
            </div>
            <div class="row-wrap">
              <input type="number" id="limit" value="20" min="1" />
              <input type="number" id="offset" value="0" min="0" readonly />
            </div>
            <button type="submit" class="btn">Load Books</button>
          </form>
        </article>

        <article class="panel reveal delay-1">
          <div class="section-head">
            <h2>Get Book By ID</h2>
            <span class="badge badge-ai">Detail</span>
          </div>
          <form id="detailForm" class="stack">
            <input type="number" id="bookId" min="1" placeholder="Enter book ID" />
            <button type="submit" class="btn">Get Book</button>
          </form>
          <div id="bookDetail" class="section-stack mtop"></div>
        </article>
      </section>

      <section class="panel reveal delay-2">
        <div class="row-space">
          <h2>Library Shelf</h2>
          <span id="listStatus" class="muted">No query run yet</span>
        </div>
        <div id="bookList" class="book-grid"></div>
        <div id="listPagination"></div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script src="/static/ui/js/common.js"></script>
    <script src="/static/ui/js/books-view.js"></script>
  </body>
</html>
